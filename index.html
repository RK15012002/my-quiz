<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#F3ECDA">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>QuizMaster</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --paper:#F3ECDA;
    --paper-light:#FBF8EF;
    --graphite:#2B2B2E;
    --graphite-soft:#6B6759;
    --pencil:#E8B923;
    --pen-blue:#2C5F8A;
    --pen-red:#C0392B;
    --pen-green:#3F7D4F;
    --line:#D8CBA8;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--graphite);}
  body{
    font-family:'Public Sans',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  button{font-family:inherit;}
  .app-shell{max-width:540px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative;}
  .content{flex:1;padding:24px 20px 12px;}

  .stamp{
    display:inline-block;border:3px solid var(--pen-blue);color:var(--pen-blue);
    padding:6px 16px;transform:rotate(-2deg);font-family:'Space Mono',monospace;
    font-weight:700;text-transform:uppercase;letter-spacing:2px;border-radius:4px;
    font-size:clamp(20px,6vw,28px);
  }
  .subtitle{color:var(--graphite-soft);margin-top:18px;font-size:15px;line-height:1.5;}
  .eyebrow{
    font-family:'Space Mono',monospace;font-size:12px;letter-spacing:1.5px;
    text-transform:uppercase;color:var(--graphite-soft);margin-bottom:4px;
  }

  .home-hero{padding-top:12vh;text-align:center;}
  .home-buttons{margin-top:48px;display:flex;flex-direction:column;gap:14px;}

  .btn{
    display:flex;align-items:center;justify-content:center;gap:10px;
    padding:16px 20px;border-radius:10px;border:none;font-size:16px;font-weight:600;
    cursor:pointer;min-height:52px;transition:transform .1s ease, opacity .15s ease;
  }
  .btn:active{transform:scale(0.98);}
  .btn-primary{background:var(--pen-blue);color:#fff;}
  .btn-success{background:var(--pen-green);color:#fff;}
  .btn-outline{background:transparent;color:var(--graphite);border:1.5px solid var(--graphite);}
  .btn-text{background:transparent;color:var(--pen-blue);font-weight:600;padding:10px;}
  .btn-danger{background:transparent;color:var(--pen-red);border:1.5px solid var(--pen-red);}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .btn-row{display:flex;gap:10px;}
  .btn-row .btn{flex:1;}

  .card{
    background:var(--paper-light);border:1px solid var(--line);border-radius:12px;
    padding:18px;margin-bottom:14px;
  }
  .perforated::before{
    content:"";display:block;height:10px;margin:-18px -18px 14px;
    background-image:radial-gradient(circle, var(--paper) 3.2px, transparent 3.6px);
    background-size:16px 16px;background-position:2px -3px;background-repeat:repeat-x;
    border-bottom:1px dashed var(--line);
  }

  .field-label{font-size:13px;font-weight:600;color:var(--graphite-soft);margin-bottom:6px;display:block;}
  input[type=text], textarea{
    width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:8px;
    font-size:15px;font-family:inherit;background:#fff;color:var(--graphite);
  }
  input[type=text]:focus, textarea:focus{outline:2px solid var(--pen-blue);outline-offset:1px;border-color:var(--pen-blue);}
  textarea{resize:vertical;min-height:70px;}

  /* progress */
  .progress-track{height:8px;background:var(--line);border-radius:4px;overflow:hidden;margin:14px 0 6px;}
  .progress-fill{height:100%;background:var(--pencil);transition:width .25s ease;}
  .progress-label{font-family:'Space Mono',monospace;font-size:12px;color:var(--graphite-soft);}

  .question-text{font-size:clamp(18px,5vw,22px);font-weight:700;line-height:1.35;margin:16px 0 22px;}

  /* scantron-style options */
  .option{
    display:flex;align-items:center;gap:14px;padding:14px;border:1.5px solid var(--line);
    border-radius:10px;margin-bottom:10px;background:var(--paper-light);cursor:pointer;
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  .option:active{transform:scale(0.995);}
  .option.selected{border-color:var(--pen-blue);box-shadow:0 0 0 1.5px var(--pen-blue) inset;}
  .option.locked{cursor:default;}
  .option.correct{background:#CFE8D4;border-color:var(--pen-green);box-shadow:0 0 0 1.5px var(--pen-green) inset;}
  .option.incorrect{background:#F3D3CD;border-color:var(--pen-red);box-shadow:0 0 0 1.5px var(--pen-red) inset;}
  .bubble{
    width:32px;height:32px;min-width:32px;border-radius:50%;border:2.5px solid var(--graphite);
    display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;
    font-weight:700;font-size:14px;transition:background .15s ease, border-color .15s ease;
  }
  .option.selected .bubble{background:var(--pencil);border-color:var(--graphite);}
  .option.correct .bubble{background:#fff;border-color:var(--pen-green);}
  .option.incorrect .bubble{background:#fff;border-color:var(--pen-red);}
  .option-text{font-size:15.5px;}

  .feedback-msg{margin-top:16px;padding:12px 14px;border-radius:8px;font-weight:700;font-size:14.5px;}
  .feedback-correct{background:#E7F1E9;color:var(--pen-green);}
  .feedback-wrong{background:#F7E8E6;color:var(--pen-red);}
  .feedback-locked{background:var(--line);color:var(--graphite-soft);}

  .toggle-row{display:flex;align-items:center;gap:10px;margin-top:26px;font-size:13.5px;color:var(--graphite-soft);}
  .toggle-row input[type=checkbox]{width:19px;height:19px;accent-color:var(--pen-blue);flex-shrink:0;}
  .toggle-row.mt-tight{margin-top:14px;}

  .timer-input-row{display:flex;align-items:center;gap:10px;margin-top:12px;margin-left:29px;}
  .timer-input-row .field-label{margin-bottom:0;white-space:nowrap;}
  .timer-input-row input[type=text]{width:64px;padding:8px 10px;text-align:center;}

  .advanced-settings{margin-top:22px;}
  .advanced-toggle{
    background:none;border:none;padding:0;color:var(--graphite-soft);font-size:13px;font-weight:600;
    cursor:pointer;font-family:inherit;
  }
  .advanced-panel{display:none;margin-top:12px;padding:14px;border:1px dashed var(--line);border-radius:10px;}
  .advanced-panel.open{display:block;}
  .advanced-panel input[type=text]{width:120px;}

  /* per-question timer badge */
  .meta-row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .timer-display{
    font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:var(--graphite-soft);
    background:var(--paper-light);border:1.5px solid var(--line);border-radius:20px;padding:4px 12px;
    white-space:nowrap;
  }
  .timer-display.timer-warning{color:var(--pen-red);border-color:var(--pen-red);background:#F7E8E6;}

  /* bottom nav */
  .bottom-nav{
    position:sticky;bottom:0;background:var(--paper);padding:14px 20px calc(14px + env(safe-area-inset-bottom));
    border-top:1px solid var(--line);display:flex;flex-direction:column;gap:10px;
  }

  /* modal */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(43,43,46,.55);display:flex;align-items:flex-end;
    justify-content:center;z-index:50;
  }
  .modal{
    background:var(--paper-light);width:100%;max-width:540px;border-radius:16px 16px 0 0;
    padding:22px 20px calc(22px + env(safe-area-inset-bottom));max-height:88vh;overflow-y:auto;
  }
  .modal h3{margin:0 0 16px;font-family:'Space Mono',monospace;font-size:16px;text-transform:uppercase;letter-spacing:1px;}
  .type-toggle{display:flex;gap:8px;margin:10px 0 16px;}
  .type-pill{
    flex:1;padding:10px;text-align:center;border:1.5px solid var(--line);border-radius:8px;
    font-size:13.5px;font-weight:600;cursor:pointer;color:var(--graphite-soft);
  }
  .type-pill.active{border-color:var(--pen-blue);color:var(--pen-blue);background:#EAF1F6;}
  .option-input-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .option-input-row span{font-family:'Space Mono',monospace;font-size:13px;width:18px;color:var(--graphite-soft);}
  .hint{font-size:12px;color:var(--graphite-soft);margin-top:4px;line-height:1.4;}

  /* builder list */
  .q-row{
    display:flex;justify-content:space-between;align-items:flex-start;gap:10px;
    padding:12px;border:1px solid var(--line);border-radius:8px;margin-bottom:8px;background:var(--paper-light);
  }
  .q-row-text{font-size:14.5px;flex:1;}
  .q-row-remove{color:var(--pen-red);background:none;border:none;font-size:13px;font-weight:600;cursor:pointer;padding:4px;}

  /* results */
  .score-badge{
    font-family:'Space Mono',monospace;font-size:clamp(28px,9vw,40px);font-weight:700;
    text-align:center;margin:6px 0 4px;
  }
  .pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;}
  .pill-correct{background:#E7F1E9;color:var(--pen-green);}
  .pill-wrong{background:#F7E8E6;color:var(--pen-red);}
  .pill-skipped{background:var(--line);color:var(--graphite-soft);}
  .marks-label{float:right;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:var(--graphite-soft);}
  .review-answer{font-size:14px;margin-top:8px;color:var(--graphite-soft);}
  .review-answer b{color:var(--graphite);}
  .score-breakdown{text-align:center;font-size:13px;color:var(--graphite-soft);margin-top:4px;}

  .help-text{white-space:pre-wrap;font-family:'Space Mono',monospace;font-size:12.5px;line-height:1.6;background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:14px;}

  #file-input{display:none;}
  .center-text{text-align:center;}
  .mt-6{margin-top:6px;}
  .mt-24{margin-top:24px;}

  /* dark mode */
  [data-theme="dark"]{
    --paper:#1B1B1D;--paper-light:#242427;--graphite:#F0EDE4;--graphite-soft:#A6A296;
    --pen-blue:#5B9BD5;--pen-red:#E07A6C;--pen-green:#6FBF7F;--line:#3A3A3D;
  }
  [data-theme="dark"] input[type=text],[data-theme="dark"] textarea{background:#2A2A2D;color:var(--graphite);}
  [data-theme="dark"] .modal-overlay{background:rgba(0,0,0,.65);}
  [data-theme="dark"] .option.correct{background:#274430;}
  [data-theme="dark"] .option.incorrect{background:#4A2C27;}
  [data-theme="dark"] .option.correct .bubble,[data-theme="dark"] .option.incorrect .bubble{background:#1B1B1D;}

  /* flag / bookmark button */
  .flag-btn{
    background:none;border:1.5px solid var(--line);border-radius:20px;padding:6px 12px;
    font-size:12.5px;font-weight:600;color:var(--graphite-soft);cursor:pointer;font-family:inherit;
  }
  .flag-btn.active{border-color:var(--pencil);color:#8A6A0E;background:#FBF1D6;}

  /* question navigator */
  .navigator-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:8px 0 16px;}
  .nav-cell{
    aspect-ratio:1;border-radius:8px;border:1.5px solid var(--line);background:var(--paper-light);
    font-family:'Space Mono',monospace;font-weight:700;font-size:13px;cursor:pointer;color:var(--graphite);
  }
  .nav-cell.answered{border-color:var(--pen-green);background:#E7F1E9;color:var(--pen-green);}
  .nav-cell.flagged{box-shadow:0 0 0 2px var(--pencil) inset;}
  .nav-cell.current{border-color:var(--pen-blue);box-shadow:0 0 0 2px var(--pen-blue) inset;}
  .nav-cell:disabled{opacity:.4;cursor:not-allowed;}
  .nav-legend{display:flex;flex-wrap:wrap;gap:12px;font-size:12px;color:var(--graphite-soft);margin-bottom:6px;}
  .nav-legend .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:4px;vertical-align:middle;}
  .dot-answered{background:var(--pen-green);}
  .dot-unanswered{background:var(--line);}
  .dot-flagged{background:var(--pencil);}
  .dot-current{background:var(--pen-blue);}

  /* result filter tabs */
  .tabs{display:flex;gap:8px;flex-wrap:wrap;}
  .tab-pill{
    padding:8px 12px;border:1.5px solid var(--line);border-radius:20px;font-size:12.5px;font-weight:600;
    cursor:pointer;color:var(--graphite-soft);
  }
  .tab-pill.active{border-color:var(--pen-blue);color:var(--pen-blue);background:#EAF1F6;}

  .pill-pass{background:#E7F1E9;color:var(--pen-green);}
  .pill-fail{background:#F7E8E6;color:var(--pen-red);}

  .explanation-box{
    margin-top:10px;padding:10px 12px;border-left:3px solid var(--pen-blue);background:var(--paper);
    font-size:13.5px;color:var(--graphite-soft);border-radius:4px;line-height:1.5;
  }

  /* attempt history */
  .history-row{
    display:flex;align-items:center;gap:10px;padding:14px;border:1px solid var(--line);border-radius:10px;
    margin-bottom:10px;background:var(--paper-light);cursor:pointer;
  }

  @media print{
    .no-print,.bottom-nav,#file-input{display:none !important;}
    body,.app-shell{background:#fff;}
    .card{break-inside:avoid;}
  }

  /* gear icon / settings */
  .top-bar{display:flex;justify-content:flex-end;margin-bottom:6px;}
  .gear-btn{
    background:var(--paper-light);border:1.5px solid var(--line);border-radius:50%;
    width:42px;height:42px;font-size:19px;cursor:pointer;color:var(--graphite);
    display:flex;align-items:center;justify-content:center;padding:0;flex-shrink:0;
  }
  .gear-btn:active{transform:scale(0.95);}
  .lang-toggle{display:flex;gap:8px;margin:10px 0 20px;}
</style>
</head>
